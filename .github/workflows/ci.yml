name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # Dev tooling only (ruff, ty, pytest) — the validator + unit tests are stdlib,
      # so we skip the heavy geo stack (rasterio/geopandas/earthengine) for a fast gate.
      - name: Install dev tools
        run: uv sync --no-install-project --only-group dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check core modules (ty)
        run: uv run ty check src/nbs_ruralscan/schema_tools/structure.py src/nbs_ruralscan/runtime/binding.py

      - name: Unit tests (pytest)
        run: uv run pytest -q

      # CSV is the source of truth; JSON is generated. Fail if any JSON is stale.
      - name: Schema JSON in sync with CSV
        run: python3 src/nbs_ruralscan/schema_tools/generate.py schema --check

      # The frozen-structure gate: every schema data file must match the column manifest.
      - name: Schema structure validation
        run: python3 src/nbs_ruralscan/schema_tools/structure.py schema
