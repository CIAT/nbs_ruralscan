ria-hidden=\"true\"><use href=\"#i-globe\"><\u002Fuse><\u002Fsvg>Country / region<\u002Flabel>\n            <select id=\"sel-country\"><option>Sierra Leone<\u002Foption><\u002Fselect>\n          <\u002Fdiv>\n          <div class=\"ctl\">\n            <label class=\"lbl\" for=\"sel-sub-nat\">Sub-national focus<\u002Flabel>\n            <select id=\"sel-sub-nat\">\n              <option>All districts (national)<\u002Foption>\n              <option>Bo district<\u002Foption>\n              <option>Kenema district<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"panel\">\n          <div class=\"ph\"><h2><svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-thermometer\"><\u002Fuse><\u002Fsvg>2 · Climate &amp; resolution<\u002Fh2><\u002Fdiv>\n          <div class=\"ctl\">\n            <label class=\"lbl\" for=\"sel-res\">Analysis resolution<\u002Flabel>\n            <select id=\"sel-res\">\n              <option>1 km (recommended)<\u002Foption>\n              <option>500 m<\u002Foption>\n              <option>5 km<\u002Foption>\n            <\u002Fselect>\n            <div class=\"help\">Resolution audit will flag any upsampled inputs.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ctl\">\n            <span class=\"lbl\"><svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-alert\"><\u002Fuse><\u002Fsvg>Climate risk mode<\u002Fspan>\n            <div class=\"radio-list\" role=\"radiogroup\" aria-label=\"Climate risk mode\">\n              <label><input type=\"radio\" name=\"mode\" checked=\"\"> <span>Mode A · Hazard × Exposure<\u002Fspan> <span class=\"pill green\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg>RECOMMENDED<\u002Fspan><\u002Flabel>\n              <label><input type=\"radio\" name=\"mode\"> <span>Mode B · H × E × Vulnerability<\u002Fspan><\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ctl\">\n            <span class=\"lbl\">Scenarios to compare<\u002Fspan>\n            <div class=\"check-list\">\n              <label><input type=\"checkbox\" checked=\"\"> Baseline (1981–2010)<\u002Flabel>\n              <label><input type=\"checkbox\" checked=\"\"> SSP2-4.5 · mid-century<\u002Flabel>\n              <label><input type=\"checkbox\"> SSP5-8.5 · mid-century<\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"col-center\">\n        <div class=\"panel\" style=\"flex:1; display:flex; flex-direction:column;\">\n          <div class=\"ph\">\n            <h2><svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-database\"><\u002Fuse><\u002Fsvg>3 · Recipe summary &amp; dataset readiness<\u002Fh2>\n            <span class=\"right mono\">agroforestry v0.3<\u002Fspan>\n          <\u002Fdiv>\n          <p>The selected recipe will pull <b>23 variables<\u002Fb> across 6 thematic categories. <b>19 of 23<\u002Fb> are native to GEE; <b>3<\u002Fb> require upload (one-off); <b>1<\u002Fb> has a community-mirrored asset.<\u002Fp>\n\n          <h3>Dataset hosting status<\u002Fh3>\n          <div class=\"row-flex\">\n            <span class=\"pill green\"><span class=\"dot\"><\u002Fspan>19 · NATIVE GEE<\u002Fspan>\n            <span class=\"pill amber\"><span class=\"dot\"><\u002Fspan>1 · COMMUNITY GEE<\u002Fspan>\n            <span class=\"pill amber\"><span class=\"dot\"><\u002Fspan>3 · PENDING UPLOAD<\u002Fspan>\n          <\u002Fdiv>\n\n          <h3>Variable themes<\u002Fh3>\n          <div class=\"theme-grid\">\n            <div class=\"theme\"><b>Topographic<\u002Fb> <span class=\"cnt\">4 vars<\u002Fspan><span class=\"ls\">slope · elevation · aspect · TWI<\u002Fspan><\u002Fdiv>\n            <div class=\"theme\"><b>Climatic<\u002Fb> <span class=\"cnt\">5 vars<\u002Fspan><span class=\"ls\">rainfall · PET · aridity · temp · variability<\u002Fspan><\u002Fdiv>\n            <div class=\"theme\"><b>Soil<\u002Fb> <span class=\"cnt\">4 vars<\u002Fspan><span class=\"ls\">depth · texture · OC · pH<\u002Fspan><\u002Fdiv>\n            <div class=\"theme\"><b>LULC / vegetation<\u002Fb> <span class=\"cnt\">3 vars<\u002Fspan><span class=\"ls\">land cover · NDVI · tree cover<\u002Fspan><\u002Fdiv>\n            <div class=\"theme\"><b>Socio-econ / infra<\u002Fb> <span class=\"cnt\">4 vars<\u002Fspan><span class=\"ls\">distance to road · population · electrification · market access<\u002Fspan><\u002Fdiv>\n            <div class=\"theme\"><b>Hazard<\u002Fb> <span class=\"cnt\">3 vars<\u002Fspan><span class=\"ls\">drought (SPEI) · flood · heat<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <h3>Variable reduction (correlation analysis)<\u002Fh3>\n          <p>Correlation clustering runs after standardisation. Expected ~<b>16 representative variables<\u002Fb> enter MCDA after collapsing <code>|r| &gt; 0.7<\u002Fcode> clusters. Cluster membership is preserved and shown to the user.<\u002Fp>\n\n          <div style=\"margin-top:auto; padding-top:18px; display:flex; align-items:center; gap:14px; border-top: 1px solid var(--rule);\">\n            <button class=\"btn-primary\" type=\"button\">\n              <svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-cpu\"><\u002Fuse><\u002Fsvg>\n              Run analysis\n              <svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-arrow-right\"><\u002Fuse><\u002Fsvg>\n            <\u002Fbutton>\n            <span class=\"muted\">Runs on GEE Python · cached outputs reused where possible<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"col-right\">\n        <div class=\"panel\">\n          <div class=\"ph\"><h2><svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-info\"><\u002Fuse><\u002Fsvg>Why these defaults?<\u002Fh2><\u002Fdiv>\n          <p><b>Resolution · 1 km<\u002Fb> — coarsest socio-economic input is poverty surface at 1 km; finer outputs would be misleading.<\u002Fp>\n          <p><b>Mode A<\u002Fb> — recommended for pilot to avoid double-counting vulnerability variables that also appear in TTL Hotspots. Mode B available for full IPCC AR6 risk formulation.<\u002Fp>\n          <p><b>Both scenarios<\u002Fb> — baseline + SSP2-4.5 supports the \"act now vs. delay\" narrative for Laurent's TTLs.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <div class=\"ph\"><h2><svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-users\"><\u002Fuse><\u002Fsvg>Project context<\u002Fh2><\u002Fdiv>\n          <p>Pilot use case · <b>Sierra Leone FSRP<\u002Fb> (Food System Resilience Program). LDCF/GEF preparation in flight; agroforestry features in target landscapes.<\u002Fp>\n          <p class=\"muted\" style=\"margin-top:8px;\">Methodology applies anywhere — schema is country-agnostic; T7 defines geographic context.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- =====================================================================\n         OPPORTUNITY SPACE  (default)\n         ===================================================================== -->\n    <section role=\"tabpanel\" id=\"panel-opp\" aria-labelledby=\"tab-opp\" tabindex=\"0\" data-tab=\"opp\" data-active=\"\">\n      <p class=\"vh\">Opportunity Space tab — where the selected NbS can plausibly be implemented in Sierra Leone, with suitability classes, scorecard, and what-if constraint toggles.<\u002Fp>\n\n      <div class=\"col-left\">\n        <div class=\"panel\">\n          <div class=\"ph\"><h2><svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-leaf\"><\u002Fuse><\u002Fsvg>NbS context<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:14px; font-weight:800; color: var(--ink); letter-spacing: -.005em;\">Agroforestry<\u002Fp>\n          <p class=\"muted\" style=\"margin-top:2px;\">Perennial tree-crop variant — integration of perennial trees with crops at farm or landscape scale.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"panel uration<\u002Fh2>\n            <span class=\"tag\">— agroforestry recipe v0.3 · 23 variables · Reduce / Source / Explain<\u002Fspan>\n            <span class=\"right\">click a row <svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-chevron-right\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"var-table\">\n          <div class=\"var-list\" role=\"listbox\" aria-label=\"Variable list\">\n            <div class=\"vg\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-layers\"><\u002Fuse><\u002Fsvg>Topographic · 4<\u002Fdiv>\n            <div class=\"var-item\" role=\"option\" aria-current=\"true\"><span>Slope<\u002Fspan><span class=\"vc\">3<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Elevation<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Aspect<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>TWI · topo wetness<\u002Fspan><\u002Fdiv>\n\n            <div class=\"vg\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-sun\"><\u002Fuse><\u002Fsvg>Climatic · 5<\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Annual rainfall<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>PET<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Aridity index<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Temperature<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Rainfall variability<\u002Fspan><\u002Fdiv>\n\n            <div class=\"vg\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-droplet\"><\u002Fuse><\u002Fsvg>Soil · 4<\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Soil depth<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Soil texture<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Soil organic carbon<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Soil pH<\u002Fspan><\u002Fdiv>\n\n            <div class=\"vg\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-tree\"><\u002Fuse><\u002Fsvg>LULC / vegetation · 3<\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Land cover<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Tree cover<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>NDVI<\u002Fspan><\u002Fdiv>\n\n            <div class=\"vg\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-route\"><\u002Fuse><\u002Fsvg>Socio-econ / infra · 4<\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Distance to road<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Population density<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Electrification<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Market access<\u002Fspan><\u002Fdiv>\n\n            <div class=\"vg\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-alert\"><\u002Fuse><\u002Fsvg>Hazard · 3<\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Drought (SPEI)<\u002Fspan><span class=\"vc\">2<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Flood hazard<\u002Fspan><\u002Fdiv>\n            <div class=\"var-item\" role=\"option\"><span>Heat stress<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"var-detail\">\n            <div class=\"breadcrumb\">Recipe · Agroforestry v0.3 / Topographic / Slope<\u002Fdiv>\n            <h2>Land slope<\u002Fh2>\n            <div class=\"vsub\">\n              <span class=\"pill blue\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-layers\"><\u002Fuse><\u002Fsvg>CLUSTER REPRESENTATIVE · 3 VARS<\u002Fspan>\n              <span class=\"pill green\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg>NATIVE GEE<\u002Fspan>\n              <span class=\"pill gray\">T1 · SPATIAL<\u002Fspan>\n            <\u002Fdiv>\n\n            <div class=\"slot\">\n              <div class=\"slot-label\">What it is<\u002Fdiv>\n              <div class=\"slot-text\">Rate of elevation change across the landscape, expressed in degrees from horizontal. Derived from a 30 m Digital Elevation Model.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"slot\">\n              <div class=\"slot-label\">Why included<span class=\"sub\">agroforestry-specific<\u002Fspan><\u002Fdiv>\n              <div class=\"slot-text\">Slope controls runoff, root anchoring, mechanisation feasibility, and erosion risk for tree-crop establishment. Steep slopes constrain implementation; very flat areas may waterlog.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"slot\">\n              <div class=\"slot-label\">How to read<\u002Fdiv>\n              <div class=\"slot-text\">\n                <b>0–8°<\u002Fb> (gentle) — highly suitable · <b>8–20°<\u002Fb> — moderately suitable, terracing may help · <b>&gt; 25°<\u002Fb> — generally unsuitable for tree-crop agroforestry without engineering. Trapezoidal fuzzy membership applied.\n                <div class=\"mf-preview\">\n                  <svg viewBox=\"0 0 320 80\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width: 100%; max-width: 380px;\" role=\"img\" aria-label=\"Trapezoidal fuzzy membership curve: full membership from 0 to 8 degrees, declining linearly to 25 degrees.\">\n                    <!-- grid -->\n                    <line x1=\"30\" y1=\"62\" x2=\"300\" y2=\"62\" stroke=\"#888780\" stroke-width=\"1\"><\u002Fline>\n                    <line x1=\"30\" y1=\"12\" x2=\"30\" y2=\"62\" stroke=\"#888780\" stroke-width=\"1\"><\u002Fline>\n                    <line x1=\"30\" y1=\"22\" x2=\"300\" y2=\"22\" stroke=\"#ddd9cd\" stroke-width=\".5\" stroke-dasharray=\"2 3\"><\u002Fline>\n                    <text x=\"24\" y=\"26\" font-size=\"8.5\" fill=\"#6c6a62\" text-anchor=\"end\" font-family=\"ui-monospace, monospace\">1.0<\u002Ftext>\n                    <text x=\"24\" y=\"65\" font-size=\"8.5\" fill=\"#6c6a62\" text-anchor=\"end\" font-family=\"ui-monospace, monospace\">0.0<\u002Ftext>\n                    <!-- area under curve -->\n                    <polygon points=\"30,62 30,22 80,22 200,22 280,62\" fill=\"rgba(26,58,107,.1)\"><\u002Fpolygon>\n                    <!-- membership polyline -->\n                    <polyline points=\"30,62 30,22 80,22 200,22 280,62 300,62\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"2\"><\u002Fpolyline>\n                    <!-- points -->\n                    <circle cx=\"30\" cy=\"22\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle>\n                    <circle cx=\"80\" cy=\"22\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle>\n                    <circle cx=\"200\" cy=\"22\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle>\n                    <circle cx=\"280\" cy=\"62\" r=\"3\" fill=\"var(--accent)\"><\u002Fcircle>\n                    <!-- x labels -->\n                    <text x=\"30\" y=\"76\" font-size=\"9\" fill=\"#444\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\">0°<\u002Ftext>\n                    <text x=\"80\" y=\"76\" font-size=\"9\" fill=\"#444\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\">8°<\u002Ftext>\n                    <text x=\"200\" y=\"76\" font-size=\"9\" fill=\"#444\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\">20°<\u002Ftext>\n                    <text x=\"280\" y=\"76\" font-size=\"9\" fill=\"#444\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\">25°<\u002Ftext>\n                    <text x=\"294\" y=\"20\" font-size=\"9\" fill=\"#6c6a62\" text-anchor=\"end\" font-family=\"ui-monospace, monospace\">suitability<\u002Ftext>\n                  <\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"slot\">\n              <div class=\"slot-label\">Cluster<span class=\"sub\">|r| &gt; 0.7<\u002Fspan><\u002Fdiv>\n              <div class=\"slot-text\">\n                In this AOI (Sierra Leone), slope correlates strongly with these variables; it represents them in the MCDA:\n                <div class=\"represents\">\n                  <span class=\"rchip\">Aspect · r = 0.78<\u002Fspan>\n                  <span class=\"rchip\">Curvature · r = 0.81<\u002Fspan>\n                  <span class=\"rchip\">TWI · r = 0.73<\u002Fspan>\n                <\u002Fdiv>\n                <p class=\"muted\" style=\"margin-top:6px; font-size:10.5px;\">You can promote any of these to its own row, or pick a different cluster representative, in technical mode.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"slot\">\n              <div class=\"slot-label\">Source<\u002Fdiv>\n              <div class=\"slot-text\">\n                <div class=\"source-block\">\n                  <div class=\"src-line\"><span class=\"pill green\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg>NATIVE GEE<\u002Fspan><b>SRTM v3<\u002Fb> · 30 m · global · <code>USGS/SRTMGL1_003<\u002Fcode> · CC0<\u002Fdiv>\n                  <p class=\"muted\" style=\"margin-top:6px;\">Pre-processed at 1 km via mean resampling for the analysis layer. Resampled view marked in the resolution audit.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- =====================================================================\n         DANGER ZONE\n         ===================================================================== -->\n    <section role=\"tabpanel\" id=\"panel-danger\" aria-labelledby=\"tab-danger\" tabindex=\"0\" data-tab=\"danger\">\n      <p class=\"vh\">Danger Zone tab — restricted methodology and cache controls. Administrator only.<\u002Fp>\n\n      <div class=\"col-center\" style=\"flex:1;\">\n        <div class=\"danger-banner\">\n          <div class=\"dl\"><svg class=\"ic-xs\" aria-hidden=\"true\"><use href=\"#i-lock\"><\u002Fuse><\u002Fsvg>RESTRICTED<\u002Fdiv>\n          <div>\n            <h2>Methodology &amp; cache controls<\u002Fh2>\n            <p>Actions in this tab modify the analytical configuration or invalidate precomputed outputs across the team. Limited to designated administrators.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"panel\">\n          <div class=\"ph\"><h2><svg class=\"ic\" aria-hidden=\"true\"><use href=\"#i-shield\"><\u002Fuse><\u002Fsvg>Restricted actions<\u002Fh2><span class=\"right\">audit-logged<\u002Fspan><\u002Fdiv>\n          <ul style=\"list-style: none; display: grid; gap: 6px;\">\n            <li class=\"dz-row\"><span class=\"num\">01<\u002Fspan><span class=\"lbl-d\"><b>Edit T4 suitability response functions<\u002Fb> <span class=\"muted\">— changes methodology<\u002Fspan><\u002Fspan><span class=\"pill amber\">METHODOLOGY<\u002Fspan><\u002Fli>\n            <li class=\"dz-row\"><span class=\"num\">02<\u002Fspan><span class=\"lbl-d\"><b>Invalidate cached suitability surfaces<\u002Fb><\u002Fspan><span class=\"pill gray\">CACHE<\u002Fspan><\u002Fli>\n            <li class=\"dz-row\"><span class=\"num\">03<\u002Fspan><span class=\"lbl-d\"><b>Add / remove variables<\u002Fb> from a recipe<\u002Fspan><span class=\"pill amber\">METHODOLOGY<\u002Fspan><\u002Fli>\n            <li class=\"dz-row\"><span class=\"num\">04<\u002Fspan><span class=\"lbl-d\"><b>Change global default weights<\u002Fb><\u002Fspan><span class=\"pill amber\">METHODOLOGY<\u002Fspan><\u002Fli>\n            <li class=\"dz-row\"><span class=\"num\">05<\u002Fspan><span class=\"lbl-d\"><b>Promote a non-default cluster representative<\u002Fb><\u002Fspan><span class=\"pill gray\">SCHEMA<\u002Fspan><\u002Fli>\n          <\u002Ful>\n          <p class=\"muted\" style=\"margin-top:14px;\">All changes are logged in the methodology version log and update <code>T0.last_updated<\u002Fcode>.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"placeholder\" style=\"margin-top:14px;\">\n          <h3>v0 · controls not yet wired<\u002Fh3>\n          <p>Sufficient as a visible architectural boundary. Wire to schema mutation API when the protected back-end exists.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<script>\n(function() {\n  'use strict';\n\n  /* ─────────────────────────── TABS (ARIA-compliant) ─────────────────────────── */\n  const tabs = Array.from(document.querySelectorAll('[role=\"tab\"]'));\n  const panels = Array.from(document.querySelectorAll('[role=\"tabpanel\"]'));\n\n  function activateTab(tab) {\n    tabs.forEach(t => {\n      const selected = t === tab;\n      t.setAttribute('aria-selected', selected ? 'true' : 'false');\n      t.tabIndex = selected ? 0 : -1;\n    });\n    panels.forEach(p => {\n      const active = p.id === tab.getAttribute('aria-controls');\n      if (active) {\n        p.setAttribute('data-active', '');\n      } else {\n        p.removeAttribute('data-active');\n      }\n    });\n  }\n\n  tabs.forEach((tab, i) => {\n    tab.addEventListener('click', () => activateTab(tab));\n    tab.addEventListener('keydown', e => {\n      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {\n        e.preventDefault();\n        const dir = e.key === 'ArrowRight' ? 1 : -1;\n        const next = tabs[(i + dir + tabs.length) % tabs.length];\n        activateTab(next);\n        next.focus();\n      } else if (e.key === 'Home') {\n        e.preventDefault();\n        activateTab(tabs[0]); tabs[0].focus();\n      } else if (e.key === 'End') {\n        e.preventDefault();\n        activateTab(tabs[tabs.length - 1]); tabs[tabs.length - 1].focus();\n      }\n    });\n  });\n\n  /* ─────────────────────────── TOGGLES ─────────────────────────── */\n  document.querySelectorAll('.toggle, .map-scenario').forEach(group => {\n    group.querySelectorAll('button').forEach(b => {\n      b.addEventListener('click', () => {\n        group.querySelectorAll('button').forEach(x => x.setAttribute('aria-pressed', 'false'));\n        b.setAttribute('aria-pressed', 'true');\n      });\n    });\n  });\n\n  /* ─────────────────────────── VAR LIST ─────────────────────────── */\n  document.querySelectorAll('.var-list .var-item').forEach(it => {\n    it.addEventListener('click', () => {\n      document.querySelectorAll('.var-list .var-item').forEach(x => x.removeAttribute('aria-current'));\n      it.setAttribute('aria-current', 'true');\n    });\n  });\n\n  /* ─────────────────────────── RASTER GENERATION ─────────────────────────── */\n  // Suitability mock — cell positions clipped to Sierra Leone outline. Values approx fit the south-east hotspot.\n  const cellSize = 14;\n  const districts = ['Bombali','Tonkolili','Kambia','Port Loko','Western Area','Bo','Bonthe','Moyamba','Pujehun','Kenema','Kailahun','Kono','Koinadugu','Falaba'];\n\n  function classFromScore(s) {\n    if (s >= 0.78) return { k: 'VH', color: '#1f7a4d', name: 'Very high' };\n    if (s >= 0.60) return { k: 'H',  color: '#4ca57c', name: 'High' };\n    if (s >= 0.40) return { k: 'M',  color: '#c4b04a', name: 'Moderate' };\n    if (s >= 0.20) return { k: 'L',  color: '#b87f33', name: 'Low' };\n    return                { k: 'X',  color: '#c4c1b7', name: 'Excluded' };\n  }\n  function hotClassFromScore(s) {\n    if (s >= 0.78) return { k: 'VH', color: '#8a1e08', name: 'Very high' };\n    if (s >= 0.60) return { k: 'H',  color: '#c5391a', name: 'High' };\n    if (s >= 0.40) return { k: 'M',  color: '#ea8261', name: 'Moderate' };\n    if (s >= 0.20) return { k: 'L',  color: '#f7c9ad', name: 'Low' };\n    return                { k: 'X',  color: '#e8e4d8', name: 'Outside opp space' };\n  }\n\n  // Sierra Leone bounding box from clip path: roughly x 120-520, y 88-376\n  // Compute suitability with a function biased toward south-east hilly region for agroforestry,\n  // and a similar hotspot bias for hot map.\n  function suitScore(cx, cy) {\n    // SE Bo/Kenema/Kailahun cluster centre\n    const dx = (cx - 380) / 160;\n    const dy = (cy - 290) / 130;\n    let s = 1 - Math.sqrt(dx*dx + dy*dy) * 0.9;\n    // deterministic noise\n    const n = ((Math.sin(cx*12.9898 + cy*78.233) * 43758.5453) % 1);\n    s += (n - 0.5) * 0.18;\n    // northern fringe slightly drier for tree-crop\n    if (cy < 160) s -= 0.22;\n    return Math.max(0, Math.min(1, s));\n  }\n  function hotScore(cx, cy) {\n    // hotspot cluster centred on Kenema / Kailahun\n    const dx = (cx - 410) / 100;\n    const dy = (cy - 310) / 80;\n    let s = 1 - Math.sqrt(dx*dx + dy*dy);\n    const n = ((Math.sin(cx*7.13 + cy*45.7) * 12345.678) % 1);\n    s += (n - 0.5) * 0.2;\n    return Math.max(0, Math.min(1, s));\n  }\n\n  // Approx point-in-polygon test using the path. Easier: just rely on SVG clipPath.\n  // Generate a dense grid; clipPath does the visual masking.\n  function makeCells(target, scoreFn, classFn) {\n    const g = document.getElementById(target);\n    if (!g) return;\n    const rows = [];\n    for (let y = 90; y <= 366; y += cellSize) {\n      for (let x = 100; x <= 540; x += cellSize) {\n        const cx = x + cellSize/2;\n        const cy = y + cellSize/2;\n        const s = scoreFn(cx, cy);\n        const cl = classFn(s);\n        const dist = districts[Math.floor(((Math.sin(cx*3.1 + cy*1.7))*0.5 + 0.5) * districts.length)] || 'Kenema';\n        // Mock population per cell: weighted by score for opp space\n        const pop = Math.round(100 + s * 4500 + ((Math.sin(cx + cy*0.7))*0.5 + 0.5) * 800);\n        rows.push(\n          `<rect class=\"raster-cell\" x=\"${x}\" y=\"${y}\" width=\"${cellSize}\" height=\"${cellSize}\" fill=\"${cl.color}\" ` +\n          `data-class=\"${cl.k}\" data-class-name=\"${cl.name}\" data-color=\"${cl.color}\" ` +\n          `data-score=\"${s.toFixed(2)}\" data-pop=\"${pop.toLocaleString()}\" data-district=\"${dist}\">` +\n          `<title>${cl.name} · ${dist} · score ${s.toFixed(2)} · ~${pop.toLocaleString()} rural pop<\u002Ftitle>` +\n          `<\u002Frect>`\n        );\n      }\n    }\n    g.innerHTML = rows.join('');\n  }\n\n  makeCells('cells-opp', suitScore, classFromScore);\n  // hot-cells handled by makeHotCells below (chunky pixelated with bivariate support)\n\n  /* ───────────────── HOTSPOT RASTER (chunky + bivariate) ───────────────── */\n  function prioScore(cx, cy) {\n    const dx = (cx - 360) / 150;\n    const dy = (cy - 260) / 130;\n    let s = 1 - Math.sqrt(dx*dx + dy*dy) * 0.85;\n    const n = ((Math.sin(cx*4.7 + cy*8.3) * 23456.789) % 1);\n    s += (n - 0.5) * 0.22;\n    return Math.max(0, Math.min(1, s));\n  }\n  // 5×5 bivariate palette: [prioBin][suitBin] — (4,4) top-right = HOTSPOT (deep purple)\n  const BV_PALETTE = [\n    ['#ece8d6','#dcd2a0','#c4b06c','#a48838','#7a5e10'],\n    ['#d4d0c0','#c6b694','#ae9258','#8a6a28','#604610'],\n    ['#b0b4b8','#a89a90','#947466','#704c3c','#4a281c'],\n    ['#80889e','#6e6884','#5c4868','#402848','#2c142c'],\n    ['#485888','#404080','#3a2470','#280a48','#180028']\n  ];\n  function bin5(v) { return Math.min(4, Math.max(0, Math.floor(v * 5))); }\n  function combineScore(suit, prio) { return Math.sqrt(suit * prio); }\n\n  function makeHotCells(mode) {\n    const g = document.getElementById('cells-hot');\n    if (!g) return;\n    mode = mode || 'hotspot';\n    const rows = [];\n    const hotCell = 12;\n    for (let y = 90; y <= 366; y += hotCell) {\n      for (let x = 100; x <= 540; x += hotCell) {\n        const cx = x + hotCell/2;\n        const cy = y + hotCell/2;\n        const suit = suitScore(cx, cy);\n        const prio = prioScore(cx, cy);\n        const suitCl = classFromScore(suit);\n        let fill;\n        if (suitCl.k === 'X') {\n          fill = '#c4c1b7';\n        } else if (mode === 'bivariate') {\n          fill = BV_PALETTE[bin5(prio)][bin5(suit)];\n        } else {\n          const combined = combineScore(suit, prio);\n          const cl = hotClassFromScore(combined);\n          fill = cl.color;\n        }\n        rows.push(\n          `<rect class=\"raster-cell\" x=\"${x}\" y=\"${y}\" width=\"${hotCell}\" height=\"${hotCell}\" fill=\"${fill}\" ` +\n          `data-suit=\"${suit.toFixed(2)}\" data-prio=\"${prio.toFixed(2)}\">` +\n          `<title>suit ${suit.toFixed(2)} · prio ${prio.toFixed(2)}<\u002Ftitle><\u002Frect>`\n        );\n      }\n    }\n    g.innerHTML = rows.join('');\n  }\n  makeHotCells('hotspot');\n\n  // Map view toggle (hotspot ↔ bivariate)\n  const hotView = document.getElementById('hot-view');\n  const hotLegend = document.getElementById('hot-legend');\n  const hotLayerLabel = document.getElementById('hot-layer-label');\n  const hotLayerSub = document.getElementById('hot-layer-sub');\n  hotView && hotView.addEventListener('click', (e) => {\n    const btn = e.target.closest('button[data-view]');\n    if (!btn) return;\n    hotView.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', 'false'));\n    btn.setAttribute('aria-pressed', 'true');\n    const view = btn.dataset.view;\n    makeHotCells(view);\n    if (hotLegend) hotLegend.classList.toggle('bv-active', view === 'bivariate');\n    if (hotLayerLabel) hotLayerLabel.textContent = view === 'bivariate' ? 'Bivariate · suit × priority' : 'TTL hotspot score';\n    if (hotLayerSub) hotLayerSub.textContent = view === 'bivariate' ? 'Each cell shaded by its (suit, prio) bin' : 'Suitability × priorities · raster';\n  });\n\n  /* ───────────────── SCOPE FILTER (Opp + Hot bands) ───────────────── */\n  const osArea = { vh: 4900, h: 13800, m: 28000, l: 18000, x: 7600 };\n  const osNames = { vh: 'VH', h: 'H', m: 'M', l: 'L', x: 'X' };\n  function readFilter() {\n    // Read from ONE canonical band (opp-os-band first, else first hot suit band)\n    const canonical = document.querySelector('.opp-os-band [data-os]')?.closest('.os-filter') || document.querySelector('.hot-scope-row [data-os]')?.closest('.os-filter');\n    if (!canonical) return [];\n    const on = [];\n    canonical.querySelectorAll('[data-os]').forEach(b => {\n      if (b.getAttribute('aria-pressed') === 'true') on.push(b.dataset.os);\n    });\n    return on;\n  }\n  function applyFilter() {\n    const on = readFilter();\n    const totalArea = on.reduce((a, k) => a + (osArea[k] || 0), 0);\n    const labels = on.map(k => osNames[k]).join(' + ') || 'none';\n    document.querySelectorAll('.os-scope-classes').forEach(el => el.innerHTML = '<b>' + labels + '<\u002Fb>');\n    document.querySelectorAll('.os-scope-area').forEach(el => el.innerHTML = '<b>' + totalArea.toLocaleString() + ' km²<\u002Fb>');\n    // Dim cascading distribution bars\n    document.querySelectorAll('.dist-bar > div[data-cls], .stack-bar[data-os-scope] > div[data-cls]').forEach(seg => {\n      const kls = seg.dataset.cls;\n      const onCls = on.includes(kls);\n      seg.style.opacity = onCls ? '1' : '.22';\n      seg.style.filter = onCls ? 'none' : 'grayscale(0.9)';\n    });\n  }\n  document.querySelectorAll('.opp-os-band [data-os], .hot-scope-row [data-os]').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const cur = btn.getAttribute('aria-pressed') === 'true';\n      const next = cur ? 'false' : 'true';\n      // Sync ALL [data-os] buttons with the same key across both bands\n      document.querySelectorAll('[data-os=\"' + btn.dataset.os + '\"]').forEach(b => b.setAttribute('aria-pressed', next));\n      applyFilter();\n    });\n  });\n  document.querySelectorAll('.os-filter .reset').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const isHot = btn.dataset.reset === 'hot';\n      if (isHot) {\n        // Reset hot-class band only (separate from suit scope)\n        document.querySelectorAll('.hot-class-band [data-hs]').forEach(b => b.setAttribute('aria-pressed', (b.dataset.hs === 'vh' || b.dataset.hs === 'h') ? 'true' : 'false'));\n        applyHotFilter();\n      } else {\n        // Reset ALL suit bands (opp-os-band and hot-scope-row suitability) in sync\n        document.querySelectorAll('[data-os]').forEach(b => b.setAttribute('aria-pressed', (b.dataset.os === 'vh' || b.dataset.os === 'h') ? 'true' : 'false'));\n        applyFilter();\n      }\n    });\n  });\n  applyFilter();\n\n  // Hot scope band (vh/h/m/l/x hotspot classes)\n  const hsArea = { vh: 1800, h: 2400, m: 4500, l: 5200, x: 4800 };\n  const hsNames = { vh: 'VH', h: 'H', m: 'M', l: 'L', x: 'X' };\n  function applyHotFilter() {\n    const on = [];\n    document.querySelectorAll('.hot-class-band [data-hs]').forEach(b => {\n      if (b.getAttribute('aria-pressed') === 'true') on.push(b.dataset.hs);\n    });\n    const total = on.reduce((a, k) => a + hsArea[k], 0);\n    const labels = on.map(k => hsNames[k]).join(' + ') || 'none';\n    document.querySelectorAll('.hs-scope-classes').forEach(el => el.innerHTML = '<b>' + labels + '<\u002Fb>');\n    document.querySelectorAll('.hs-scope-area').forEach(el => el.innerHTML = '<b>' + total.toLocaleString() + ' km²<\u002Fb>');\n    const banner = document.querySelector('.hot-masked-banner');\n    if (banner) {\n      const ch = banner.querySelectorAll('.ch');\n      if (ch[1]) ch[1].textContent = 'HOTSPOT ' + labels.toUpperCase();\n      const share = banner.querySelector('.area');\n      if (share) {\n        const pct = ((total / 72300) * 100).toFixed(1);\n        share.innerHTML = 'intersection · <b>' + total.toLocaleString() + ' km²<\u002Fb> · ' + pct + '% of country';\n      }\n    }\n  }\n  document.querySelectorAll('.hot-class-band [data-hs]').forEach(btn => {\n    btn.addEventListener('click', () => {\n      const cur = btn.getAttribute('aria-pressed') === 'true';\n      btn.setAttribute('aria-pressed', cur ? 'false' : 'true');\n      applyHotFilter();\n    });\n  });\n  applyHotFilter();\n\n  /* ─────────────────────────── PRIORITY RAIL + PRESETS ───────────────────────── */\n  const prioRail = document.getElementById('prio-rail');\n  const prioSummary = document.getElementById('prio-summary');\n  const presetStrip = document.querySelector('#panel-hotspot .preset-strip');\n  const prioLabels = {\n    drought:'Drought', heat:'Heat', flood:'Flood', erosion:'Erosion',\n    poverty:'Rural poverty', food:'Food insecurity', gender:'Gender', biodiv:'Biodiversity', carbon:'Carbon', fire:'Fire risk',\n    pop:'Pop. density', farms:'Farms', prod:'Production $', iplc:'IPLC',\n    roads:'Roads', elec:'Electrification', market:'Market acc.', portfolio:'Portfolio fit'\n  };\n  const prioPresets = {\n    climate:    { drought:3, heat:3, flood:2, erosion:2, poverty:2, food:2, gender:1, biodiv:1, carbon:1, fire:1, pop:2, farms:1, prod:1, iplc:0, roads:1, elec:0, market:1, portfolio:0 },\n    livelihood: { drought:2, heat:1, flood:0, erosion:1, poverty:3, food:2, gender:2, biodiv:1, carbon:1, fire:0, pop:2, farms:2, prod:2, iplc:1, roads:1, elec:0, market:2, portfolio:1 },\n    biodiv:     { drought:1, heat:1, flood:1, erosion:2, poverty:1, food:1, gender:1, biodiv:3, carbon:3, fire:2, pop:1, farms:1, prod:1, iplc:2, roads:0, elec:0, market:0, portfolio:1 },\n    portfolio:  { drought:1, heat:1, flood:1, erosion:1, poverty:2, food:1, gender:1, biodiv:1, carbon:1, fire:0, pop:2, farms:2, prod:3, iplc:0, roads:3, elec:2, market:3, portfolio:3 }\n  };\n  function setPrio(varKey, level) {\n    const row = prioRail && prioRail.querySelector('[data-var=\"' + varKey + '\"]');\n    if (!row) return;\n    row.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', String(Number(b.dataset.p) === level)));\n  }\n  function readPrios() {\n    const out = {};\n    prioRail && prioRail.querySelectorAll('.prio').forEach(g => {\n      const v = g.dataset.var;\n      const active = g.querySelector('button[aria-pressed=\"true\"]');\n      out[v] = active ? Number(active.dataset.p) : 0;\n    });\n    return out;\n  }\n  function updateSummary() {\n    if (!prioSummary) return;\n    const p = readPrios();\n    const entries = Object.entries(p).filter(([,lvl]) => lvl > 0).sort((a,b) => b[1] - a[1]).slice(0, 6);\n    const chips = entries.map(([k, lvl]) => {\n      const mark = ['', 'L', 'M', 'H'][lvl];\n      return '<span class=\"pc\"><span class=\"mark lvl' + lvl + '\">' + mark + '<\u002Fspan>' + (prioLabels[k] || k) + '<\u002Fspan>';\n    }).join('');\n    prioSummary.innerHTML = '<span class=\"key\">Top drivers<\u002Fspan>' + (chips || '<span class=\"pc\" style=\"color:var(--mute);\">no priorities set<\u002Fspan>');\n  }\n  prioRail && prioRail.addEventListener('click', (e) => {\n    const btn = e.target.closest('.prio button');\n    if (!btn) return;\n    const group = btn.closest('.prio');\n    group.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', 'false'));\n    btn.setAttribute('aria-pressed', 'true');\n    presetStrip && presetStrip.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', 'false'));\n    updateSummary();\n  });\n  presetStrip && presetStrip.addEventListener('click', (e) => {\n    const btn = e.target.closest('button[data-preset]');\n    if (!btn) return;\n    const profile = prioPresets[btn.dataset.preset];\n    if (!profile) return;\n    presetStrip.querySelectorAll('button').forEach(b => b.setAttribute('aria-pressed', 'false'));\n    btn.setAttribute('aria-pressed', 'true');\n    Object.entries(profile).forEach(([v, lvl]) => setPrio(v, lvl));\n    updateSummary();\n  });\n  updateSummary();\n\n  /* ───────────────────────── NbS COMPARISON ─────────────────────────── */\n  const cmpStrip = document.getElementById('cmp-strip');\n  const cmpAddBtn = document.getElementById('cmp-add-btn');\n  const cmpPicker = document.getElementById('cmp-picker');\n  const cmpMatrix = document.getElementById('cmp-matrix');\n  function cmpRefreshCount() {\n    const n = cmpStrip.querySelectorAll('.cmp-chip').length;\n    const countEl = cmpStrip.querySelector('.cmp-count');\n    if (countEl) countEl.firstChild.nodeValue = n + ' NbS · Sierra Leone · baseline + SSP2-4.5 / 2050';\n  }\n  cmpStrip && cmpStrip.addEventListener('click', (e) => {\n    const x = e.target.closest('.cmp-x');\n    if (!x) return;\n    const chip = x.closest('.cmp-chip');\n    if (!chip) return;\n    const nbsKey = chip.dataset.nbs;\n    chip.remove();\n    if (nbsKey && cmpMatrix) {\n      cmpMatrix.querySelectorAll('[data-nbs=\"' + nbsKey + '\"]').forEach(el => el.remove());\n      const cols = cmpMatrix.querySelectorAll('.cmp-head .cmp-col').length;\n      cmpMatrix.style.setProperty('--cmp-cols', cols);\n      cmpMatrix.querySelectorAll('.cmp-row').forEach(row => {\n        const cells = row.querySelectorAll('.cmp-cell');\n        for (let i = cells.length - 1; i >= cols; i--) cells[i].remove();\n      });\n    }\n    cmpRefreshCount();\n  });\n  cmpAddBtn && cmpAddBtn.addEventListener('click', (e) => {\n    e.stopPropagation();\n    const isOpen = cmpPicker.dataset.open === 'true';\n    cmpPicker.dataset.open = isOpen ? 'false' : 'true';\n    if (!isOpen) {\n      const rect = cmpAddBtn.getBoundingClientRect();\n      const parentRect = cmpStrip.getBoundingClientRect();\n      cmpPicker.style.left = (rect.left - parentRect.left) + 'px';\n      cmpPicker.style.top  = (rect.bottom - parentRect.top + 6) + 'px';\n    }\n  });\n  document.addEventListener('click', (e) => {\n    if (!cmpPicker) return;\n    if (e.target.closest('#cmp-picker') || e.target.closest('#cmp-add-btn')) return;\n    cmpPicker.dataset.open = 'false';\n  });\n  cmpPicker && cmpPicker.addEventListener('click', (e) => {\n    const item = e.target.closest('.pi');\n    if (!item || item.classList.contains('disabled')) return;\n    const key = item.dataset.add;\n    if (!key) return;\n    if (cmpStrip.querySelector('[data-nbs=\"' + key + '\"]')) { item.classList.add('disabled'); return; }\n    const name = item.querySelector('.nm').textContent.trim();\n    const archEl = item.querySelector('.arch');\n    const archText = archEl ? archEl.textContent.trim() : '';\n    const chip = document.createElement('div');\n    chip.className = 'cmp-chip';\n    chip.dataset.nbs = key;\n    chip.innerHTML = name + ' <span class=\"cmp-arch\">' + archText + '<\u002Fspan><button class=\"cmp-x\" type=\"button\" aria-label=\"Remove\">\\u00d7<\u002Fbutton>';\n    cmpStrip.insertBefore(chip, cmpAddBtn);\n    item.classList.add('disabled');\n    cmpPicker.dataset.open = 'false';\n    cmpRefreshCount();\n    if (cmpMatrix) {\n      const head = cmpMatrix.querySelector('.cmp-head');\n      const col = document.createElement('div');\n      col.className = 'cmp-col';\n      col.dataset.nbs = key;\n      col.innerHTML = '<div class=\"nm\">' + name + '<\u002Fdiv><div class=\"sub\">queued<\u002Fdiv><div class=\"arch\" style=\"background:var(--bg-2); color:var(--mute);\">PLACEHOLDER<\u002Fdiv>';\n      head.appendChild(col);\n      const cols = head.querySelectorAll('.cmp-col').length;\n      cmpMatrix.style.setProperty('--cmp-cols', cols);\n      cmpMatrix.querySelectorAll('.cmp-row').forEach(row => {\n        const cell = document.createElement('div');\n        cell.className = 'cmp-cell empty';\n        cell.textContent = '—';\n        row.appendChild(cell);\n      });\n    }\n  });\n\n  /* ─────────────────────────── MAP TOOLTIP ─────────────────────────── */\n  const tip = document.getElementById('map-tip');\n  const oppMapWrap = document.querySelector('#panel-opp .map-wrap');\n\n  function showTip(rect, mouseEvt) {\n    if (!tip || !oppMapWrap) return;\n    const cn = tip.querySelector('.cn-name');\n    const sw = tip.querySelector('.sw');\n    const sv = tip.querySelector('.score-v');\n    const pv = tip.querySelector('.pop-v');\n    const dv = tip.querySelector('.dist-v');\n    cn.textContent = rect.dataset.className || rect.dataset.class || '';\n    sw.style.background = rect.dataset.color || '#888';\n    sv.textContent = rect.dataset.score || '—';\n    pv.textContent = (rect.dataset.pop || '—') + ' rural';\n    dv.textContent = rect.dataset.district || '—';\n\n    const wrapBox = oppMapWrap.getBoundingClientRect();\n    const x = mouseEvt.clientX - wrapBox.left;\n    const y = mouseEvt.clientY - wrapBox.top;\n    tip.style.left = x + 'px';\n    tip.style.top  = y + 'px';\n    tip.setAttribute('data-visible', 'true');\n  }\n  function hideTip() {\n    if (tip) tip.removeAttribute('data-visible');\n  }\n\n  document.querySelectorAll('#opp-map .raster-cell').forEach(r => {\n    r.addEventListener('mouseenter', e => showTip(r, e));\n    r.addEventListener('mousemove',  e => showTip(r, e));\n    r.addEventListener('mouseleave', hideTip);\n  });\n\n  /* ─────────────────────────── PRINT FINGERPRINT ─────────────────────────── */\n  const btnPrint = document.getElementById('btn-print-fp');\n  if (btnPrint) {\n    btnPrint.addEventListener('click', () => {\n      document.body.classList.add('printing-fingerprint');\n      setTimeout(() => {\n        window.print();\n        setTimeout(() => document.body.classList.remove('printing-fingerprint'), 400);\n      }, 60);\n    });\n  }\n  window.addEventListener('afterprint', () => {\n    document.body.classList.remove('printing-fingerprint');\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
